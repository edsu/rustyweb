name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: build · test · fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Installs the exact toolchain + components pinned in rust-toolchain.toml,
      # so CI matches local `rustup` (single source of truth for the Rust version).
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked
